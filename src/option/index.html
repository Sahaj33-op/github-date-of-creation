<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GDC Options</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <h1>
      <svg height="24" viewBox="0 0 24 24" width="24" fill="currentColor"><path d="M11.83 1.72a.75.75 0 0 1 .42.76v.02c-.06.45-.1.97-.1 1.54 0 1.05.15 2.22.61 3.23.44.97 1.15 1.77 2.11 2.45.69.49 1.48.88 2.3 1.19.86.33 1.75.54 2.6.61a.75.75 0 0 1 .6 1.05 13.92 13.92 0 0 1-1.34 2.76c-.53.86-1.16 1.66-1.84 2.37-1.37 1.42-3.04 2.5-4.88 3.14a12.7 12.7 0 0 1-4.41.79 12.7 12.7 0 0 1-4.41-.79c-1.84-.64-3.51-1.72-4.88-3.14a16.8 16.8 0 0 1-1.84-2.37 13.92 13.92 0 0 1-1.34-2.76.75.75 0 0 1 .6-1.05c.85-.07 1.74-.28 2.6-.61.82-.31 1.61-.7 2.3-1.19.96-.68 1.67-1.48 2.11-2.45.46-1.01.61-2.18.61-3.23 0-.57-.04-1.09-.1-1.54v-.02a.75.75 0 0 1 .42-.76ZM5.9 14h12.2a12.42 12.42 0 0 0-1.63-2.07 14.33 14.33 0 0 0-2.28-1.92 14.88 14.88 0 0 0-1.93-1.01A10.82 10.82 0 0 0 12 8.5a10.82 10.82 0 0 0-.26.5c-.2.43-.44.82-.7 1.18-.74.96-1.66 1.83-2.67 2.58A12.42 12.42 0 0 0 5.9 14Z"></path></svg>
      GitHub Creation Date
    </h1>

    <div class="section">
      <label class="label">Personal Access Token (PAT)</label>
      <div class="description">
        Required for more than 60 requests/hour. 
        <a href="https://github.com/settings/tokens/new?description=GitHub%20Date%20of%20Creation&scopes=" target="_blank" style="color: var(--primary-color);">Generate one here</a> (No scopes needed).
      </div>
      <input type="text" id="pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    </div>

    <div class="section">
      <label class="label">Features</label>
      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="relativeTime">
          Use relative time (e.g. "4 years ago")
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="showHealth">
          Show last push (maintenance status)
        </label>
      </div>
    </div>

    <div class="section">
      <label class="label">Date Format (for absolute dates)</label>
      <select id="date-format-select">
        <option value="MMMM, YYYY">Full Month, YYYY (e.g. June, 2021)</option>
        <option value="MMM D, YYYY">MMM D, YYYY (e.g. Jun 24, 2021)</option>
        <option value="YYYY-MM-DD">ISO Format (2021-06-24)</option>
        <option value="DD/MM/YYYY">European (24/06/2021)</option>
        <option value="custom">Custom Format...</option>
      </select>
      <input type="text" id="custom-format" placeholder="e.g. YYYY-MM" style="display:none; margin-top: 10px;">
    </div>

    <div class="preview-box">
      <div class="preview-title">Live Preview</div>
      <div id="preview-content">
        <svg height="16" class="octicon octicon-calendar" viewBox="0 0 16 16" width="16" fill="var(--text-muted)"><path d="M13 2h-1v1.5c0 .28-.22.5-.5.5h-2c-.28 0-.5-.22-.5-.5V2H6v1.5c0 .28-.22.5-.5.5h-2c-.28 0-.5-.22-.5-.5V2H2c-.55 0-1 .45-1 1v11c0 .55.45 1 1 1h11c.55 0 1-.45 1-1V3c0-.55-.45-1-1-1zm0 12H2V5h11v9zM5 3H4V1h1v2zm6 0h-1V1h1v2z"></path></svg>
        <span id="preview-text">Created 4 years ago • Last push 2 days ago</span>
      </div>
    </div>

    <div id="status" class="status-badge status-success">Settings saved automatically</div>

    <div class="footer">
      Build with ❤️ by <a href="https://github.com/Sahaj33-op" target="_blank">Sahaj</a>
    </div>
  </div>

  <script src="../constant/index.js"></script>
  <script src="../formatters/index.js"></script>
  <script src="./index.js"></script>
</body>
</html>
